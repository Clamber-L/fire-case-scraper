name: Build Fire Case

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          target: x86_64-unknown-linux-musl

      - name: Install dependencies (Zig + cargo-zigbuild)
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

          ZIG_VERSION=0.11.0
          curl -LO https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz
          tar -xf zig-linux-x86_64-${ZIG_VERSION}.tar.xz
          sudo mv zig-linux-x86_64-${ZIG_VERSION} /opt/zig
          echo "/opt/zig" >> $GITHUB_PATH

          echo "export PATH=/opt/zig:$PATH" >> $GITHUB_ENV

          cargo install cargo-zigbuild

      - name: Build fire-case (static binary for CentOS 7)
        working-directory: ./
        run: |
          cargo zigbuild --package fire-case --target x86_64-unknown-linux-musl --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: fire-case-linux-x86_64
          path: ./target/x86_64-unknown-linux-musl/release/fire-case